name: Pull Request Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

jobs:
  deploy:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build

      - name: Deploy PR Preview to Surge
        run: |
          DOMAIN="react-video-editor-pr-${{ github.event.number }}.surge.sh"
          npx surge dist/ $DOMAIN --token 9d3b4ee409a48af28e6c3afdfb50d5af

      - name: Post Preview Link Comment
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.issue.number;
            const url = `https://react-video-editor-pr-${prNumber}.surge.sh`;
            const commentBody = `🚀 **PR Preview Deployment is ready!**\n\nYou can test the changes live here: [${url}](${url})`;
            
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });
            
            const botComment = comments.find(c => c.body.includes('PR Preview Deployment is ready'));
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: commentBody
              });
            }

  teardown:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Teardown PR Preview on Surge
        run: |
          DOMAIN="react-video-editor-pr-${{ github.event.number }}.surge.sh"
          npx surge teardown $DOMAIN --token 9d3b4ee409a48af28e6c3afdfb50d5af
